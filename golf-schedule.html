<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛳ 골프 날짜 조율</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --green-dark: #1a3a2a;
    --green-mid:  #2d6a4f;
    --green-light:#52b788;
    --fairway:    #95d5b2;
    --sand:       #f4d35e;
    --sky:        #f8f9fa;
    --text:       #1a1a1a;
    --muted:      #6c757d;
    --white:      #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--green-dark);
    min-height: 100vh;
    color: var(--text);
  }

  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    padding: 20px 20px 16px;
    text-align: center;
    border-bottom: 3px solid var(--green-light);
  }
  .header h1 { color: var(--white); font-size: 20px; font-weight: 900; }
  .header p  { color: var(--fairway); font-size: 12px; margin-top: 3px; }

  /* status bar */
  #statusBar {
    background: #fff3cd;
    color: #856404;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 7px 12px;
    display: none;
  }
  #statusBar.show { display: block; }
  #statusBar.ok   { background: #d1e7dd; color: #0a3622; }
  #statusBar.err  { background: #f8d7da; color: #842029; }

  .section {
    background: var(--white);
    padding: 14px 16px 12px;
  }
  .section-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
  }

  .players { display: flex; flex-wrap: wrap; gap: 8px; }
  .player-btn {
    padding: 8px 15px;
    border-radius: 20px;
    border: 2px solid #dde3e9;
    background: var(--sky);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; color: var(--muted);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .player-btn.active {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: var(--white); font-weight: 700;
  }

  /* save button */
  #saveBtn {
    display: none;
    width: calc(100% - 32px);
    margin: 10px 16px 4px;
    padding: 12px;
    background: var(--green-mid);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #saveBtn.show { display: block; }
  #saveBtn:active { background: var(--green-dark); }

  .calendar-wrap {
    background: var(--white);
    margin-top: 6px;
    padding: 0 0 12px;
  }
  .month-nav {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid #eee;
  }
  .month-nav button {
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    color: var(--green-mid); padding: 2px 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .month-label { font-size: 16px; font-weight: 700; color: var(--green-dark); }

  .weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    text-align: center; padding: 8px 8px 4px; gap: 2px;
  }
  .weekday { font-size: 11px; font-weight: 700; color: var(--muted); }
  .weekday:first-child { color: #e05260; }
  .weekday:last-child  { color: #4a90d9; }

  .days {
    display: grid; grid-template-columns: repeat(7,1fr);
    padding: 4px 8px 8px; gap: 3px;
  }
  .day {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s; min-height: 38px;
  }
  .day.empty { cursor: default; }
  .day.out-of-range { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
  .day-num { font-size: 13px; font-weight: 500; line-height: 1; z-index: 1; }
  .day.sunday   .day-num { color: #e05260; }
  .day.saturday .day-num { color: #4a90d9; }

  .dots {
    display: flex; gap: 2px; margin-top: 3px;
    flex-wrap: wrap; justify-content: center; max-width: 32px;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; }

  .day.selected-me { background: var(--green-mid); }
  .day.selected-me .day-num { color: #fff; }
  .day.selected-me.sunday   .day-num { color: #ffcdd2; }
  .day.selected-me.saturday .day-num { color: #bbdefb; }

  .day.all-available { background: var(--sand); }
  .day.all-available.selected-me { background: var(--green-light); }

  .legend {
    display: flex; gap: 14px;
    padding: 8px 16px 0; flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center;
    gap: 5px; font-size: 11px; color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .results-wrap { background: var(--green-dark); padding: 16px; }
  .results-title {
    font-size: 14px; font-weight: 700;
    color: var(--fairway); margin-bottom: 10px;
  }
  .result-list { display: flex; flex-direction: column; gap: 6px; }
  .result-item {
    background: rgba(255,255,255,0.07);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .result-item.full { background: var(--sand); }
  .result-date {
    font-size: 13px; font-weight: 700;
    color: var(--white); min-width: 100px;
  }
  .result-item.full .result-date { color: var(--green-dark); }
  .result-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .result-tag {
    font-size: 11px; font-weight: 700;
    border-radius: 20px; padding: 2px 8px;
  }
  .empty-state {
    text-align: center; padding: 24px 16px;
    color: var(--fairway); font-size: 13px; opacity: 0.7;
  }
  .loading {
    text-align: center; padding: 30px;
    color: var(--muted); font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⛳ 골프 날짜 조율</h1>
  <p>2026년 7월 15일 — 10월 31일</p>
</div>

<div id="statusBar"></div>

<div class="section">
  <div class="section-title">👤 내 이름 선택</div>
  <div class="players" id="playerBtns">
    <div class="loading">Firebase 연결 중...</div>
  </div>
  <button id="saveBtn" onclick="saveMyDates()">💾 내 날짜 저장</button>
</div>

<div class="calendar-wrap" style="padding-bottom:0;">
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--green-mid)"></div>내가 선택한 날
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--sand)"></div>전원 가능한 날
    </div>
  </div>
</div>

<div class="calendar-wrap">
  <div class="month-nav">
    <button id="prevBtn">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="nextBtn">›</button>
  </div>
  <div class="weekdays">
    <div class="weekday">일</div><div class="weekday">월</div>
    <div class="weekday">화</div><div class="weekday">수</div>
    <div class="weekday">목</div><div class="weekday">금</div>
    <div class="weekday">토</div>
  </div>
  <div class="days" id="calDays"></div>
</div>

<div class="results-wrap">
  <div class="results-title">📋 날짜별 참여 현황</div>
  <div class="result-list" id="resultList">
    <div class="empty-state">데이터 불러오는 중...</div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── FIREBASE CONFIG ───────────────────────────────────────
const firebaseConfig = {
  databaseURL: 'https://golf-calendar-34246-default-rtdb.firebaseio.com'
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── CONFIG ────────────────────────────────────────────────
const PLAYERS = ['박준성','이태경','정상훈','정재훈','황승태','정철윤','이용수','이충환','김명진','정지광','김상형'];
const START   = new Date(2026, 6, 15);
const END     = new Date(2026, 9, 31);
const COLORS  = [
  '#e76f51','#2a9d8f','#e9c46a','#264653','#a8dadc','#f4a261',
  '#9b5de5','#f15bb5','#00bbf9','#00f5d4','#fee440'
];

// ── STATE ─────────────────────────────────────────────────
const availability = {};
PLAYERS.forEach(p => availability[p] = new Set());

let currentPlayer = null;
let viewYear  = 2026;
let viewMonth = 6;
let hasUnsaved = false;

// ── HELPERS ───────────────────────────────────────────────
function toKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function dateInRange(y, m, d) {
  const dt = new Date(y, m, d);
  return dt >= START && dt <= END;
}
function formatDateKo(key) {
  const [y, m, d] = key.split('-');
  const dt = new Date(+y, +m-1, +d);
  const days = ['일','월','화','수','목','금','토'];
  return `${+m}월 ${+d}일 (${days[dt.getDay()]})`;
}
function showStatus(msg, type='') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'show ' + type;
  if (type === 'ok') setTimeout(() => bar.className = '', 3000);
}

// ── SAVE ──────────────────────────────────────────────────
window.saveMyDates = async function() {
  if (!currentPlayer) return;
  showStatus('저장 중...', '');
  try {
    const dates = [...availability[currentPlayer]];
    await set(ref(db, 'availability/' + currentPlayer), dates.length ? dates : null);
    hasUnsaved = false;
    document.getElementById('saveBtn').textContent = '💾 내 날짜 저장';
    showStatus('✅ ' + currentPlayer + ' 저장 완료!', 'ok');
  } catch(e) {
    showStatus('❌ 저장 실패: ' + e.message, 'err');
  }
};

// ── RENDER PLAYERS ────────────────────────────────────────
function renderPlayers() {
  const wrap = document.getElementById('playerBtns');
  wrap.innerHTML = '';
  PLAYERS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'player-btn' + (currentPlayer === name ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      if (hasUnsaved && currentPlayer && currentPlayer !== name) {
        if (!confirm(currentPlayer + '의 변경사항을 저장하지 않고 이동할까요?')) return;
        hasUnsaved = false;
      }
      currentPlayer = (currentPlayer === name) ? null : name;
      hasUnsaved = false;
      const saveBtn = document.getElementById('saveBtn');
      if (currentPlayer) {
        saveBtn.classList.add('show');
        saveBtn.textContent = '💾 내 날짜 저장';
      } else {
        saveBtn.classList.remove('show');
      }
      renderPlayers();
      renderCalendar();
    };
    wrap.appendChild(btn);
  });
}

// ── RENDER CALENDAR ───────────────────────────────────────
function renderCalendar() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthLabel').textContent = `${viewYear}년 ${months[viewMonth]}`;

  const wrap = document.getElementById('calDays');
  wrap.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div');
    e.className = 'day empty';
    wrap.appendChild(e);
  }

  for (let d = 1; d <= lastDate; d++) {
    const key = toKey(viewYear, viewMonth, d);
    const inRange = dateInRange(viewYear, viewMonth, d);
    const dt  = new Date(viewYear, viewMonth, d);
    const dow = dt.getDay();

    const cell = document.createElement('div');
    cell.className = 'day'
      + (dow === 0 ? ' sunday' : '')
      + (dow === 6 ? ' saturday' : '')
      + (!inRange ? ' out-of-range' : '');

    const selectedBy  = PLAYERS.filter(p => availability[p].has(key));
    const allSelected = selectedBy.length === PLAYERS.length;
    const iSelectedMe = currentPlayer && availability[currentPlayer].has(key);

    if (iSelectedMe)  cell.classList.add('selected-me');
    if (allSelected)  cell.classList.add('all-available');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (selectedBy.length > 0) {
      const dotsEl = document.createElement('div');
      dotsEl.className = 'dots';
      selectedBy.forEach(p => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = iSelectedMe ? 'rgba(255,255,255,0.7)' : COLORS[PLAYERS.indexOf(p)];
        dotsEl.appendChild(dot);
      });
      cell.appendChild(dotsEl);
    }

    if (inRange) {
      cell.onclick = () => {
        if (!currentPlayer) { alert('먼저 이름을 선택하세요!'); return; }
        if (availability[currentPlayer].has(key)) {
          availability[currentPlayer].delete(key);
        } else {
          availability[currentPlayer].add(key);
        }
        hasUnsaved = true;
        document.getElementById('saveBtn').textContent = '💾 저장 필요! 탭해서 저장';
        renderCalendar();
        renderResults();
      };
    }

    wrap.appendChild(cell);
  }
}

// ── RENDER RESULTS ────────────────────────────────────────
function renderResults() {
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  const allDates = new Set();
  PLAYERS.forEach(p => availability[p].forEach(k => allDates.add(k)));

  if (allDates.size === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '이름 선택 후 가능한 날짜를 탭하세요 🏌️';
    list.appendChild(empty);
    return;
  }

  [...allDates].sort().forEach(key => {
    const selected = PLAYERS.filter(p => availability[p].has(key));
    const isFull   = selected.length === PLAYERS.length;

    const item = document.createElement('div');
    item.className = 'result-item' + (isFull ? ' full' : '');

    const dateEl = document.createElement('div');
    dateEl.className = 'result-date';
    dateEl.textContent = formatDateKo(key);
    item.appendChild(dateEl);

    const dotsEl = document.createElement('div');
    dotsEl.className = 'result-dots';

    selected.forEach(p => {
      const tag = document.createElement('span');
      tag.className = 'result-tag';
      tag.textContent = p;
      const c = COLORS[PLAYERS.indexOf(p)];
      tag.style.background = isFull ? 'rgba(0,0,0,0.1)' : c + '33';
      tag.style.color       = isFull ? '#1a3a2a' : c;
      tag.style.border      = `1px solid ${isFull ? 'rgba(0,0,0,0.1)' : c + '55'}`;
      dotsEl.appendChild(tag);
    });

    if (isFull) {
      const star = document.createElement('span');
      star.className = 'result-tag';
      star.textContent = '⭐ 전원 가능';
      star.style.cssText = 'background:rgba(0,0,0,0.12);color:#1a3a2a;border:1px solid rgba(0,0,0,0.1)';
      dotsEl.appendChild(star);
    }

    item.appendChild(dotsEl);
    list.appendChild(item);
  });
}

// ── NAV ───────────────────────────────────────────────────
document.getElementById('prevBtn').onclick = () => {
  if (viewMonth === 6 && viewYear === 2026) return;
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
};
document.getElementById('nextBtn').onclick = () => {
  if (viewMonth === 9 && viewYear === 2026) return;
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
};

// ── FIREBASE REALTIME LISTENER ────────────────────────────
onValue(ref(db, 'availability'), (snapshot) => {
  const data = snapshot.val() || {};
  PLAYERS.forEach(p => {
    availability[p] = new Set(Array.isArray(data[p]) ? data[p] : []);
  });
  renderPlayers();
  renderCalendar();
  renderResults();
}, (error) => {
  showStatus('❌ Firebase 연결 오류: ' + error.message, 'err');
});

// ── INIT ──────────────────────────────────────────────────
renderCalendar();
showStatus('🔄 Firebase 연결 중...', '');
</script>
</body>
</html>
